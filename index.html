<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Observe Haotian</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#080c14; --surface:#0e1420; --surface2:#141b2d;
      --border:#1e2d45; --accent:#4f8ef7; --accent2:#7c3aed;
      --green:#10b981; --yellow:#f59e0b; --red:#ef4444;
      --text:#e2e8f0; --muted:#4a5568; --subtle:#1a2540;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    /* Grid bg */
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:40px 40px;opacity:0.25;z-index:0;pointer-events:none;}

    /* Blobs */
    .blob{position:fixed;border-radius:50%;filter:blur(120px);opacity:0.06;z-index:0;pointer-events:none;}
    .b1{width:600px;height:600px;background:#4f8ef7;top:-200px;left:-100px;animation:drift 12s ease-in-out infinite alternate;}
    .b2{width:500px;height:500px;background:#7c3aed;bottom:-100px;right:-100px;animation:drift 15s ease-in-out infinite alternate-reverse;}
    @keyframes drift{from{transform:translate(0,0)}to{transform:translate(40px,30px)}}

    /* ── Gate ── */
    #gate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
    .gate-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:380px;text-align:center;}
    .gate-logo{width:60px;height:60px;border-radius:16px;margin:0 auto 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;box-shadow:0 0 40px rgba(79,142,247,0.3);}
    .gate-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;}
    .gate-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
    .gate-input{width:100%;padding:13px 16px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:15px;outline:none;font-family:inherit;margin-bottom:8px;transition:border-color 0.2s;}
    .gate-input:focus{border-color:var(--accent);}
    .gate-err{font-size:12px;color:var(--red);height:20px;margin-bottom:8px;transition:opacity 0.3s;opacity:0;}
    .gate-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity 0.2s;}
    .gate-btn:hover{opacity:0.85;}

    /* ── Topbar ── */
    .topbar{position:sticky;top:0;z-index:100;background:rgba(8,12,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:60px;}
    .brand{display:flex;align-items:center;gap:10px;}
    .brand-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;}
    .brand h1{font-size:15px;font-weight:700;color:#fff;}
    .brand h1 span{color:var(--accent);}
    .topbar-right{display:flex;align-items:center;gap:14px;}
    .clock{font-size:13px;font-variant-numeric:tabular-nums;color:var(--muted);}
    .live-pill{display:flex;align-items:center;gap:6px;background:#0d1f12;border:1px solid #1a3a24;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--green);letter-spacing:.5px;}
    .live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* ── Layout ── */
    .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 80px;}

    /* ── Hero ── */
    .hero{padding:52px 0 36px;display:flex;align-items:center;justify-content:space-between;gap:32px;}
    .hero-h{font-size:44px;font-weight:800;line-height:1.1;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .hero-sub{font-size:15px;color:var(--muted);margin-top:10px;}
    .hero-date{font-size:12px;color:#2d4a6e;margin-top:6px;}
    .avatar{width:80px;height:80px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;box-shadow:0 0 40px rgba(79,142,247,0.25);}

    /* ── Stats ── */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:default;transition:transform .2s,border-color .2s;}
    .stat:hover{transform:translateY(-3px);border-color:var(--accent);}
    .stat-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .stat-val{font-size:30px;font-weight:800;color:#fff;line-height:1;}
    .stat-val.g{color:var(--green);} .stat-val.y{color:var(--yellow);} .stat-val.b{color:var(--accent);}
    .stat-hint{font-size:11px;color:var(--muted);margin-top:5px;}

    /* ── Day tabs ── */
    .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
    .tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
    .tab:hover{border-color:var(--accent);color:var(--accent);}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}

    /* ── Two col ── */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .grid1{margin-bottom:16px;}

    /* ── Card ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;}
    .card-head{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:18px;}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .dg{background:var(--green);box-shadow:0 0 8px var(--green);}
    .dy{background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
    .db{background:var(--accent);box-shadow:0 0 8px var(--accent);}

    /* ── Task item (expandable) ── */
    .task{border-radius:10px;border:1px solid transparent;margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
    .task:last-child{margin-bottom:0;}
    .task:hover{border-color:var(--subtle);}
    .task-top{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;user-select:none;}
    .task-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;}
    .i-done{background:#0d2218;border:1px solid #1a4030;color:var(--green);}
    .i-wip{background:#1f1a0a;border:1px solid #3d3010;color:var(--yellow);}
    .i-todo{background:#0d1829;border:1px solid #1a2f4a;color:var(--accent);}
    .task-title{font-size:13.5px;color:#c5d1e0;line-height:1.4;flex:1;}
    .task-title.done{color:#6a8aa8;}
    .task-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
    .task-detail{display:none;padding:0 12px 12px 44px;font-size:12.5px;color:#5a7a96;line-height:1.6;}
    .task.open .task-chevron{transform:rotate(90deg);}
    .task.open .task-detail{display:block;}
    .task.open{border-color:var(--border);background:var(--surface2);}
    .spin{animation:rotate 3s linear infinite;display:inline-block;}
    @keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}

    /* ── Progress ── */
    .prog-wrap{margin-top:16px;}
    .prog-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;}
    .prog-bar{height:6px;background:var(--subtle);border-radius:99px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1);}

    /* ── Chart + Timeline ── */
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;}
    .chart-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:18px;}
    canvas{max-height:160px;}
    .timeline{position:relative;padding-left:20px;}
    .timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border);}
    .tl-item{position:relative;margin-bottom:18px;}
    .tl-dot{position:absolute;left:-18px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);}
    .tl-date{font-size:11px;color:var(--muted);margin-bottom:3px;}
    .tl-text{font-size:13px;color:#7a9ab5;line-height:1.5;}

    /* ── Section label ── */
    .sec-lbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
    .sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

    /* ── Responsive ── */
    @media(max-width:700px){
      .stats{grid-template-columns:1fr 1fr;}
      .grid2{grid-template-columns:1fr;}
      .hero{flex-direction:column;padding:36px 0 28px;}
      .hero-h{font-size:30px;}
      .avatar{display:none;}
      .topbar{padding:0 16px;}
    }
  </style>
</head>
<body>

<!-- Password gate -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">H</div>
    <div class="gate-title">Observe Haotian</div>
    <div class="gate-sub">Enter password to continue</div>
    <input id="pw" class="gate-input" type="password" placeholder="Password" autofocus/>
    <div id="pw-err" class="gate-err">Incorrect password</div>
    <button class="gate-btn" onclick="checkPw()">Enter</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">H</div>
      <h1>Observe <span>Haotian</span></h1>
    </div>
    <div class="topbar-right">
      <div class="clock" id="clock"></div>
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <div>
        <div class="hero-h" id="h-name"></div>
        <div class="hero-sub" id="h-role"></div>
        <div class="hero-date" id="h-date"></div>
      </div>
      <div class="avatar" id="h-avatar"></div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="grid2">
      <div class="chart-card">
        <div class="chart-title">Weekly Task Completion</div>
        <canvas id="weekChart"></canvas>
      </div>
      <div class="card">
        <div class="card-head"><div class="dot db"></div>Activity Timeline</div>
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="day-view"></div>
  </div>
</div>

<script>
// ── Password ───────────────────────────────────────────────────────────────
const PW_HASH = "a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3";
async function sha256(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
async function checkPw(){
  const h=await sha256(document.getElementById("pw").value);
  if(h===PW_HASH){sessionStorage.setItem("obs_ok","1");showApp();}
  else{const e=document.getElementById("pw-err");e.style.opacity=1;document.getElementById("pw").value="";setTimeout(()=>e.style.opacity=0,2000);}
}
document.addEventListener("DOMContentLoaded",()=>{
  if(sessionStorage.getItem("obs_ok")==="1")showApp();
  document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")checkPw();});
});
function showApp(){document.getElementById("gate").style.display="none";document.getElementById("app").style.display="block";init();}

// ── Clock ──────────────────────────────────────────────────────────────────
setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});},1000);

// ── Helpers ────────────────────────────────────────────────────────────────
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmtDate=s=>new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const fmtShort=s=>new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
function animCount(el,n){let c=0;const t=setInterval(()=>{c=Math.min(c+Math.ceil(n/25),n);el.textContent=c;if(c>=n)clearInterval(t);},40);}

// ── Global state ──────────────────────────────────────────────────────────
let DATA=null, activeDay=0, chartInst=null;

// ── Fetch + render ─────────────────────────────────────────────────────────
async function load(){
  const r=await fetch("data.json?t="+Date.now());
  DATA=await r.json();
  render();
}

function render(){
  const d=DATA;
  // Hero
  document.getElementById("h-name").textContent=d.name;
  document.getElementById("h-role").textContent=d.role+" · "+d.company;
  document.getElementById("h-date").textContent="Last updated "+fmtDate(d.last_updated);
  document.getElementById("h-avatar").textContent=d.name[0];

  // Stats from latest day
  const today=d.days[d.days.length-1];
  const totalEver=d.days.reduce((s,x)=>s+(x.completed||[]).length,0);
  const statsData=[
    {lbl:"Done Today",val:(today.completed||[]).length,cls:"g",hint:"tasks completed"},
    {lbl:"In Progress",val:(today.in_progress||[]).length,cls:"y",hint:"work items"},
    {lbl:"Up Next",val:(today.todo||[]).length,cls:"b",hint:"queued"},
    {lbl:"Total Done",val:totalEver,cls:"",hint:"all time"},
  ];
  const sEl=document.getElementById("stats");
  sEl.innerHTML=statsData.map(s=>`
    <div class="stat">
      <div class="stat-lbl">${s.lbl}</div>
      <div class="stat-val ${s.cls}" data-n="${s.val}">0</div>
      <div class="stat-hint">${s.hint}</div>
    </div>`).join("");
  sEl.querySelectorAll(".stat-val").forEach(e=>animCount(e,+e.dataset.n));

  // Chart
  if(chartInst)chartInst.destroy();
  const labels=d.days.slice(-7).map(x=>fmtShort(x.date));
  const vals=d.days.slice(-7).map(x=>(x.completed||[]).length);
  chartInst=new Chart(document.getElementById("weekChart"),{
    type:"bar",
    data:{labels,datasets:[{data:vals,backgroundColor:"rgba(79,142,247,0.2)",borderColor:"rgba(79,142,247,0.9)",borderWidth:2,borderRadius:6,hoverBackgroundColor:"rgba(79,142,247,0.4)"}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{
      x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#4a5568",font:{size:11}}},
      y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#4a5568",font:{size:11},stepSize:1},beginAtZero:true}
    }}
  });

  // Timeline
  const colors=["#10b981","#4f8ef7","#7c3aed","#f59e0b","#ef4444"];
  document.getElementById("timeline").innerHTML=[...d.days].reverse().slice(0,5).map((x,i)=>{
    const last=(x.completed||[]).slice(-1)[0];
    const txt=last?(last.title||last):"No tasks";
    return `<div class="tl-item"><div class="tl-dot" style="background:${colors[i%5]}"></div><div class="tl-date">${fmtDate(x.date)}</div><div class="tl-text">${esc(txt)}</div></div>`;
  }).join("");

  // Tabs
  const tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML=[...d.days].reverse().map((x,i)=>`
    <button class="tab${i===activeDay?" active":""}" onclick="switchDay(${i})">${fmtShort(x.date)}${i===0?" · Today":""}</button>
  `).join("");

  renderDay();
}

function switchDay(i){
  activeDay=i;
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",j===i));
  renderDay();
}

function renderDay(){
  const day=[...DATA.days].reverse()[activeDay];
  const done=(day.completed||[]).length;
  const total=done+(day.in_progress||[]).length+(day.todo||[]).length;
  const pct=total?Math.round(done/total*100):0;

  document.getElementById("day-view").innerHTML=`
    <div class="sec-lbl">${fmtDate(day.date)}</div>

    <div class="grid1">
      <div class="card">
        <div class="card-head"><div class="dot db"></div>Daily Progress</div>
        <div class="prog-wrap">
          <div class="prog-lbl"><span>${pct}% complete</span><span>${done} / ${total} tasks</span></div>
          <div class="prog-bar"><div class="prog-fill" id="pfill"></div></div>
        </div>
      </div>
    </div>

    <div class="grid2">
      ${taskCard("Completed","dg","i-done","✓",false,day.completed||[])}
      ${taskCard("In Progress","dy","i-wip","◌",true,day.in_progress||[])}
    </div>
    <div class="grid1">
      ${taskCard("Up Next","db","i-todo","›",false,day.todo||[])}
    </div>
  `;

  requestAnimationFrame(()=>setTimeout(()=>{
    const f=document.getElementById("pfill");
    if(f)f.style.width=pct+"%";
  },80));
}

function taskCard(title,dotCls,iconCls,icon,spin,items){
  if(!items.length)return`<div class="card"><div class="card-head"><div class="dot ${dotCls}"></div>${title}</div><div style="font-size:13px;color:var(--muted)">Nothing here</div></div>`;
  const rows=items.map((t,i)=>{
    const ttl=t.title||t;
    const det=t.detail||"";
    const sp=spin?` class="spin"`:""
    return `<div class="task" id="tk-${title}-${i}">
      <div class="task-top" onclick="toggleTask('tk-${title}-${i}')">
        <div class="task-icon ${iconCls}"><span${sp}>${icon}</span></div>
        <div class="task-title${iconCls==='i-done'?' done':''}">${esc(ttl)}</div>
        ${det?`<span class="task-chevron">›</span>`:''}
      </div>
      ${det?`<div class="task-detail">${esc(det)}</div>`:''}
    </div>`;
  }).join("");
  return`<div class="card"><div class="card-head"><div class="dot ${dotCls}"></div>${title}</div>${rows}</div>`;
}

function toggleTask(id){
  document.getElementById(id)?.classList.toggle("open");
}

function init(){load();setInterval(load,60000);}
</script>
</body>
</html>
