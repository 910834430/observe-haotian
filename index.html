<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Observe Haotian</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --surface2: #141b2d;
      --border: #1e2d45;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #4a5568;
      --subtle: #1e2d45;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      z-index: 0;
      pointer-events: none;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.07;
      z-index: 0;
      pointer-events: none;
    }
    .blob-1 { width: 600px; height: 600px; background: #4f8ef7; top: -200px; left: -100px; animation: drift 12s ease-in-out infinite alternate; }
    .blob-2 { width: 500px; height: 500px; background: #7c3aed; bottom: -100px; right: -100px; animation: drift 15s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 30px); } }

    /* ── Layout ── */
    .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .topbar-brand .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: #fff;
    }
    .topbar-brand h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .topbar-brand span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .clock { font-size: 13px; font-variant-numeric: tabular-nums; color: var(--muted); }
    .live-pill {
      display: flex; align-items: center; gap: 6px;
      background: #0d1f12; border: 1px solid #1a3a24;
      border-radius: 20px; padding: 5px 12px;
      font-size: 11px; font-weight: 600; color: var(--green);
      letter-spacing: 0.5px;
    }
    .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Hero ── */
    .hero {
      padding: 64px 0 48px;
      display: flex; align-items: center; justify-content: space-between; gap: 40px;
    }
    .hero-text h2 {
      font-size: 48px; font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-text .tagline { font-size: 16px; color: var(--muted); margin-top: 12px; }
    .hero-text .updated { font-size: 12px; color: #2d4a6e; margin-top: 8px; }
    .hero-avatar {
      width: 90px; height: 90px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800; color: #fff;
      box-shadow: 0 0 40px rgba(79,142,247,0.3);
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
    .stat-value { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
    .stat-value.green { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.blue { color: var(--accent); }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* ── Section title ── */
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Two-col grid ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .one-col { margin-bottom: 16px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #2d4a6e; }
    .card-head {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; margin-bottom: 20px;
    }
    .card-head .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot-yellow { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    .dot-blue { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

    /* ── Task items ── */
    .task-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--subtle);
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
    }
    .task-item:last-child { border-bottom: none; }
    @keyframes fadeIn { to { opacity: 1; } }

    .task-icon {
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px; font-size: 12px;
    }
    .icon-done { background: #0d2218; border: 1px solid #1a4030; color: var(--green); }
    .icon-wip  { background: #1f1a0a; border: 1px solid #3d3010; color: var(--yellow); }
    .icon-todo { background: #0d1829; border: 1px solid #1a2f4a; color: var(--accent); }

    .task-text { font-size: 13.5px; line-height: 1.6; color: #c5d1e0; }
    .task-text.done { color: #7a9ab5; }

    /* Spinning WIP icon */
    .spin { animation: rotate 3s linear infinite; display: inline-block; }
    @keyframes rotate { from{transform:rotate(0)} to{transform:rotate(360deg)} }

    /* ── Progress bar ── */
    .progress-wrap { margin-top: 20px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .progress-bar { height: 6px; background: var(--subtle); border-radius: 99px; overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
      width: 0;
    }

    /* ── Chart card ── */
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
    .chart-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 20px; }
    canvas { max-height: 180px; }

    /* ── Timeline ── */
    .timeline { position: relative; padding-left: 24px; }
    .timeline::before { content:''; position:absolute; left:7px; top:0; bottom:0; width:2px; background: var(--border); }
    .tl-item { position: relative; margin-bottom: 20px; }
    .tl-dot {
      position: absolute; left: -21px; top: 4px;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--bg);
    }
    .tl-date { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .tl-text { font-size: 13px; color: #a0b4c8; line-height: 1.5; }

    /* ── Footer ── */
    .footer { text-align: center; font-size: 12px; color: #1e2d45; padding-top: 40px; }

    /* ── Responsive ── */
    @media(max-width:700px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .hero { flex-direction: column; padding: 40px 0 32px; }
      .hero-text h2 { font-size: 32px; }
      .hero-avatar { display: none; }
      .topbar { padding: 0 20px; }
    }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="logo">H</div>
    <h1>Observe <span>Haotian</span></h1>
  </div>
  <div class="topbar-right">
    <div class="clock" id="clock"></div>
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
  </div>
</div>

<div class="container">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-text">
      <h2 id="hero-name">Loading…</h2>
      <div class="tagline" id="hero-role"></div>
      <div class="updated" id="hero-updated"></div>
    </div>
    <div class="hero-avatar" id="hero-avatar"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row"></div>

  <!-- Chart + Timeline -->
  <div class="two-col">
    <div class="chart-card">
      <div class="chart-title">Weekly Task Completion</div>
      <canvas id="weekChart"></canvas>
    </div>
    <div class="card">
      <div class="card-head"><div class="dot dot-blue"></div>Activity Timeline</div>
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

  <!-- Today's content injected here -->
  <div id="day-content"></div>

  <div class="footer" id="footer"></div>
</div>

<script>
// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtDate(str) {
  return new Date(str+'T12:00:00').toLocaleDateString('en-US',
    {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

function animateCounter(el, target) {
  let cur = 0;
  const step = Math.ceil(target / 30);
  const t = setInterval(() => {
    cur = Math.min(cur + step, target);
    el.textContent = cur;
    if (cur >= target) clearInterval(t);
  }, 40);
}

// ── Chart ──────────────────────────────────────────────────────────────────
function buildChart(days) {
  const labels = days.slice(-7).map(d => {
    const dt = new Date(d.date+'T12:00:00');
    return dt.toLocaleDateString('en-US',{weekday:'short'});
  });
  const values = days.slice(-7).map(d => (d.completed||[]).length);

  new Chart(document.getElementById('weekChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: 'rgba(79,142,247,0.25)',
        borderColor: 'rgba(79,142,247,0.9)',
        borderWidth: 2,
        borderRadius: 6,
        hoverBackgroundColor: 'rgba(79,142,247,0.5)',
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { color:'#4a5568', font:{size:11} } },
        y: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { color:'#4a5568', font:{size:11}, stepSize:1 }, beginAtZero:true }
      }
    }
  });
}

// ── Timeline ───────────────────────────────────────────────────────────────
function buildTimeline(days) {
  const el = document.getElementById('timeline');
  const recent = [...days].reverse().slice(0,5);
  const colors = ['#10b981','#4f8ef7','#7c3aed','#f59e0b','#ef4444'];
  el.innerHTML = recent.map((d,i) => {
    const last = (d.completed||[]).slice(-1)[0] || 'No tasks';
    return `<div class="tl-item">
      <div class="tl-dot" style="background:${colors[i%colors.length]}"></div>
      <div class="tl-date">${fmtDate(d.date)}</div>
      <div class="tl-text">${esc(last)}</div>
    </div>`;
  }).join('');
}

// ── Main render ────────────────────────────────────────────────────────────
async function load() {
  const res = await fetch('data.json?t='+Date.now());
  const data = await res.json();

  // Hero
  document.getElementById('hero-name').textContent = data.name;
  document.getElementById('hero-role').textContent = data.role + ' · Inchor Mobility';
  document.getElementById('hero-updated').textContent = 'Last updated ' + fmtDate(data.last_updated);
  document.getElementById('hero-avatar').textContent = data.name[0];

  const today = data.days.find(d => d.date === data.last_updated) || data.days[data.days.length-1];
  const totalDone = data.days.reduce((s,d) => s + (d.completed||[]).length, 0);

  // Stats
  const stats = [
    { label: 'Done Today',    value: (today.completed||[]).length,  cls:'green', sub:'tasks completed'     },
    { label: 'In Progress',   value: (today.in_progress||[]).length,cls:'yellow',sub:'work items'          },
    { label: 'Up Next',       value: (today.todo||[]).length,       cls:'blue',  sub:'queued tasks'         },
    { label: 'Total Done',    value: totalDone,                      cls:'',      sub:'all time'             },
  ];
  const row = document.getElementById('stats-row');
  row.innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value ${s.cls}" data-target="${s.value}">0</div>
      <div class="stat-sub">${s.sub}</div>
    </div>`).join('');
  row.querySelectorAll('.stat-value').forEach(el =>
    animateCounter(el, parseInt(el.dataset.target)));

  // Progress bar
  const total = (today.completed||[]).length + (today.in_progress||[]).length + (today.todo||[]).length;
  const pct = total ? Math.round((today.completed||[]).length / total * 100) : 0;

  // Chart & Timeline
  buildChart(data.days);
  buildTimeline(data.days);

  // Day content
  const dc = document.getElementById('day-content');
  dc.innerHTML = `
    <div class="section-title">Today — ${fmtDate(today.date)}</div>

    <!-- Progress bar -->
    <div class="card one-col" style="margin-bottom:16px">
      <div class="card-head"><div class="dot dot-blue"></div>Daily Progress</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>${pct}% complete</span><span>${(today.completed||[]).length} / ${total} tasks</span></div>
        <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      </div>
    </div>

    <div class="two-col">
      ${taskCard('Completed', 'dot-green', today.completed||[], 'done', '✓')}
      ${taskCard('In Progress', 'dot-yellow', today.in_progress||[], 'wip', '◌')}
    </div>
    <div class="one-col">
      ${taskCard('Up Next', 'dot-blue', today.todo||[], 'todo', '›')}
    </div>
  `;

  // Animate progress bar after paint
  requestAnimationFrame(() => {
    setTimeout(() => {
      const fill = document.getElementById('pfill');
      if (fill) fill.style.width = pct + '%';
    }, 100);
  });

  // Stagger task animations
  document.querySelectorAll('.task-item').forEach((el, i) => {
    el.style.animationDelay = (i * 60) + 'ms';
  });

  document.getElementById('footer').textContent =
    'Observe Haotian · auto-refreshes every 60s · ' + new Date().toLocaleTimeString();
}

function taskCard(title, dotCls, items, iconType, iconChar) {
  if (!items.length) return '';
  const spin = iconType === 'wip' ? ' spin' : '';
  const rows = items.map(t => `
    <div class="task-item">
      <div class="task-icon icon-${iconType}"><span class="${spin}">${iconChar}</span></div>
      <div class="task-text ${iconType === 'done' ? 'done' : ''}">${esc(t)}</div>
    </div>`).join('');
  return `<div class="card">
    <div class="card-head"><div class="dot ${dotCls}"></div>${title}</div>
    ${rows}
  </div>`;
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
